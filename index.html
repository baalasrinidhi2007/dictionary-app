<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Colorful Dictionary App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background:linear-gradient(
        -45deg,
        #ff6b6b,
        #feca57,
        #48dbfb,
        #5f27cd
    );

    background-size:400% 400%;
    animation:gradient 12s ease infinite;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:100%;
    max-width:700px;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);

    border-radius:25px;
    padding:30px;

    color:white;

    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

h1{
    font-size:2rem;
}

.mode-btn{
    border:none;
    padding:10px 15px;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
}

.search-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    outline:none;
    font-size:16px;
}

.search-btn{
    border:none;
    background:#222;
    color:white;
    padding:15px 20px;
    border-radius:12px;
    cursor:pointer;
}

.search-btn:hover{
    transform:scale(1.05);
}

.result{
    margin-top:25px;
}

.word{
    font-size:2rem;
    font-weight:bold;
}

.phonetic{
    opacity:0.9;
    margin-top:5px;
}

.card{
    background:rgba(255,255,255,0.15);
    margin-top:15px;
    padding:15px;
    border-radius:15px;
}

.audio-btn{
    margin-top:15px;
    border:none;
    background:#10ac84;
    color:white;
    padding:12px 15px;
    border-radius:12px;
    cursor:pointer;
}

.synonyms{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
}

.tag{
    background:rgba(255,255,255,0.2);
    padding:8px 12px;
    border-radius:20px;
}

.dark{
    background:#121212;
}

.dark .container{
    background:rgba(0,0,0,0.35);
}

.loading{
    font-size:20px;
}
</style>
</head>

<body>

<div class="container">

    <div class="top">
        <h1>📖 Dictionary</h1>

        <button class="mode-btn" onclick="toggleMode()">
            🌙
        </button>
    </div>

    <div class="search-box">

        <input
            type="text"
            id="wordInput"
            placeholder="Search any English word..."
        >

        <button
            class="search-btn"
            onclick="searchWord()">
            🔍
        </button>

    </div>

    <div class="result" id="result">

        <h2>✨ Search for a word</h2>
        <p>Example: beautiful, success, computer</p>

    </div>

</div>

<script>

async function searchWord(){

    const word =
    document.getElementById("wordInput").value.trim();

    const result =
    document.getElementById("result");

    if(!word){
        result.innerHTML =
        "<h2>⚠ Please enter a word</h2>";
        return;
    }

    result.innerHTML =
    "<div class='loading'>⏳ Searching...</div>";

    try{

        const response = await fetch(
            `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`
        );

        if(!response.ok){
            throw new Error("Word not found");
        }

        const data = await response.json();

        const entry = data[0];

        const meaning = entry.meanings[0];

        const definition =
        meaning.definitions[0];

        let audio = "";

        if(entry.phonetics){

            const foundAudio =
            entry.phonetics.find(
                p => p.audio
            );

            if(foundAudio){
                audio = foundAudio.audio;
            }
        }

        const synonyms =
        meaning.synonyms
        ? meaning.synonyms.slice(0,8)
        : [];

        result.innerHTML = `

            <div class="word">
                ${entry.word}
            </div>

            <div class="phonetic">
                ${entry.phonetic || ""}
            </div>

            <div class="card">
                <h3>📖 Definition</h3>
                <p>${definition.definition}</p>
            </div>

            <div class="card">
                <h3>📝 Example</h3>
                <p>
                    ${definition.example || "No example available"}
                </p>
            </div>

            <div class="card">
                <h3>🏷 Part of Speech</h3>
                <p>${meaning.partOfSpeech}</p>
            </div>

            <div class="card">
                <h3>🔄 Synonyms</h3>

                <div class="synonyms">

                ${
                    synonyms.length
                    ?
                    synonyms.map(
                        s => `<span class="tag">${s}</span>`
                    ).join("")
                    :
                    "No synonyms available"
                }

                </div>

            </div>

            ${
                audio
                ?
                `<button
                    class="audio-btn"
                    onclick="playAudio('${audio}')">
                    🔊 Pronunciation
                </button>`
                :
                ""
            }

        `;

    }

    catch(error){

        result.innerHTML = `
            <h2>❌ Word Not Found</h2>
            <p>Try another English word.</p>
        `;
    }

}

function playAudio(url){
    const audio = new Audio(url);
    audio.play();
}

function toggleMode(){
    document.body.classList.toggle("dark");
}

document
.getElementById("wordInput")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        searchWord();
    }

});

</script>

</body>
</html>
